<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TOONHUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      transition: background-color 650ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    #grain {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 50;
      background-size: 200px 200px;
      background-repeat: repeat;
      opacity: 0.4;
    }

    #ghost-text {
      position: absolute; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; user-select: none;
      z-index: 2;
      /* FIX: smaller font on mobile, moved down a touch so it's not crowding top */
      top: 8%;
      font-family: 'Anton', sans-serif;
      /* FIX: tighter clamp on mobile — was 36px min, now 24px so it's less congested */
      font-size: clamp(24px, 11vw, 280px);
      font-weight: 900; color: white;
      line-height: 1; text-transform: uppercase;
      letter-spacing: -0.02em; white-space: nowrap;
    }

    @media (min-width: 640px) {
      #ghost-text {
        /* Desktop: keep larger size and position */
        font-size: clamp(80px, 14vw, 280px);
        top: 12%;
      }
    }

    #carousel { position: absolute; inset: 0; z-index: 3; }

    .c-item {
      position: absolute;
      aspect-ratio: 0.6 / 1;
      transition:
        transform 650ms cubic-bezier(0.4, 0, 0.2, 1),
        filter    650ms cubic-bezier(0.4, 0, 0.2, 1),
        opacity   650ms cubic-bezier(0.4, 0, 0.2, 1),
        left      650ms cubic-bezier(0.4, 0, 0.2, 1),
        height    650ms cubic-bezier(0.4, 0, 0.2, 1),
        bottom    650ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform, filter, opacity;
    }

    .c-item img {
      width: 100%; height: 100%;
      object-fit: contain; object-position: bottom center;
      user-select: none; -webkit-user-drag: none; pointer-events: none;
    }

    /* Nav buttons */
    #nav-bar {
      position: absolute;
      bottom: max(3.5rem, env(safe-area-inset-bottom, 3.5rem));
      left: 0; right: 0;
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
    }
    @media (min-width: 640px) {
      #nav-bar {
        left: 3rem;
        right: auto;
        justify-content: flex-start;
        bottom: 3.5rem;
      }
    }

    .nav-btn {
      width: 3.8rem; height: 3.8rem;
      border-radius: 50%;
      background: transparent;
      border: 2px solid white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 150ms ease, background-color 150ms ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 640px) { .nav-btn { width: 5.5rem; height: 5.5rem; border-width: 2.5px; } }
    .nav-btn:hover  { transform: scale(1.08); background-color: rgba(255,255,255,0.12); }
    .nav-btn:active { transform: scale(0.94); }
    .nav-btn svg {
      width: 24px; height: 24px;
      stroke: white; stroke-width: 2.4;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }
    @media (min-width: 640px) { .nav-btn svg { width: 36px; height: 36px; } }

    /* Dot slider */
    #dot-slider {
      display: flex; align-items: center; gap: 6px;
    }
    @media (min-width: 640px) {
      #dot-slider { display: none; }
    }

    .dot {
      height: 7px; width: 7px; border-radius: 50%;
      background: rgba(255,255,255,0.38);
      transition: background 300ms, width 300ms ease, border-radius 300ms;
      cursor: pointer;
      flex-shrink: 0;
    }
    .dot.active {
      width: 24px; border-radius: 3.5px;
      background: white;
    }

    /* Discover — bottom right */
    #discover {
      position: absolute; z-index: 60;
      display: flex; align-items: center; gap: 5px;
      font-family: 'Anton', sans-serif;
      font-weight: 400; color: white; opacity: 0.95;
      letter-spacing: -0.02em; line-height: 1;
      text-transform: uppercase; text-decoration: none;
      transition: opacity 200ms ease;
      bottom: max(2.2rem, env(safe-area-inset-bottom, 2.2rem));
      right: 1.2rem;
      font-size: clamp(14px, 4vw, 18px);
    }
    @media (min-width: 640px) {
      #discover {
        bottom: 3.5rem; right: 3rem;
        font-size: clamp(22px, 3.5vw, 52px);
        gap: 0.5rem;
      }
    }
    #discover:hover { opacity: 1; }
    #discover svg {
      stroke: white; stroke-width: 2.4;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      width: 14px; height: 14px; flex-shrink: 0;
    }
    @media (min-width: 640px) { #discover svg { width: 2.2rem; height: 2.2rem; } }
  </style>
</head>
<body>
<div id="app">

  <div id="grain"></div>
  <div id="ghost-text">CODERS<span style="margin-left:0.12em">VERSE</span></div>

  <div id="carousel">
    <div class="c-item" id="item-0">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/1.02464a56.png" alt="Character 1" draggable="false" />
    </div>
    <div class="c-item" id="item-1">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/2.b977faab.png" alt="Character 2" draggable="false" />
    </div>
    <div class="c-item" id="item-2">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/3.4df853b4.png" alt="Character 3" draggable="false" />
    </div>
    <div class="c-item" id="item-3">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/4.4457fbce.png" alt="Character 4" draggable="false" />
    </div>
  </div>

  <!-- Nav: prev • dots • next -->
  <div id="nav-bar">
    <button class="nav-btn" id="btn-prev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
    </button>
    <div id="dot-slider">
      <div class="dot active" data-i="0"></div>
      <div class="dot" data-i="1"></div>
      <div class="dot" data-i="2"></div>
      <div class="dot" data-i="3"></div>
    </div>
    <button class="nav-btn" id="btn-next" aria-label="Next">
      <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
    </button>
  </div>

  <a href="#" id="discover">
    DISCOVER IT
    <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
  </a>

</div>
<script>
  const IMAGES = [
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/1.02464a56.png', bg: '#F4845F' },
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/2.b977faab.png', bg: '#6BBF7A' },
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/3.4df853b4.png', bg: '#E882B4' },
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/4.4457fbce.png', bg: '#6EB5FF' },
  ];

  IMAGES.forEach(function(img) { var i = new Image(); i.src = img.src; });

  var grainSVG = "<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.08'/></svg>";
  document.getElementById('grain').style.backgroundImage = 'url("data:image/svg+xml,' + encodeURIComponent(grainSVG) + '")';

  var activeIndex = 0;
  var isAnimating = false;
  var isMobile = function() { return window.innerWidth < 640; };

  function getZMap(idx) {
    var z = {};
    z[idx]           = 20;
    z[(idx + 3) % 4] = 10;
    z[(idx + 1) % 4] = 10;
    z[(idx + 2) % 4] =  5;
    return z;
  }

  function getRoleStyle(i) {
    var mob    = isMobile();
    var center = activeIndex;
    var left   = (activeIndex + 3) % 4;
    var right  = (activeIndex + 1) % 4;

    if (i === center) return {
      transform: 'translateX(-50%) scale(' + (mob ? 1.15 : 1.68) + ')',
      filter: 'none', opacity: '1',
      left: '50%',
      /* FIX desktop: reduce height slightly + increase bottom so top of character is in view */
      height: mob ? '75%' : '80%',
      bottom: mob ? '20%' : '8%'
    };
    if (i === left) return {
      transform: 'translateX(-50%) scale(1)',
      filter: 'blur(2px)', opacity: '0.7',
      left: mob ? '15%' : '30%',
      height: mob ? '27%' : '25%',
      /* FIX desktop: raise side characters slightly too */
      bottom: mob ? '22%' : '14%'
    };
    if (i === right) return {
      transform: 'translateX(-50%) scale(1)',
      filter: 'blur(2px)', opacity: '0.7',
      left: mob ? '85%' : '70%',
      height: mob ? '27%' : '25%',
      bottom: mob ? '22%' : '14%'
    };
    return {
      transform: 'translateX(-50%) scale(1)',
      filter: 'blur(4px)', opacity: '0.45',
      left: '50%',
      height: mob ? '15%' : '18%',
      bottom: mob ? '14%' : '14%'
    };
  }

  function updateDots() {
    document.querySelectorAll('.dot').forEach(function(d, i) {
      d.classList.toggle('active', i === activeIndex);
    });
  }

  function render(prevIndex) {
    document.getElementById('app').style.backgroundColor = IMAGES[activeIndex].bg;
    updateDots();

    var newZ  = getZMap(activeIndex);
    var prevZ = prevIndex !== undefined ? getZMap(prevIndex) : newZ;

    for (var i = 0; i < 4; i++) {
      (function(idx) {
        var el     = document.getElementById('item-' + idx);
        var styles = getRoleStyle(idx);

        el.style.transition = 'none';
        el.style.zIndex = String(Math.min(newZ[idx], prevZ[idx]));

        requestAnimationFrame(function() {
          el.style.transition = '';
          el.style.transform  = styles.transform;
          el.style.filter     = styles.filter;
          el.style.opacity    = styles.opacity;
          el.style.left       = styles.left;
          el.style.height     = styles.height;
          el.style.bottom     = styles.bottom;
          setTimeout(function() { el.style.zIndex = String(newZ[idx]); }, 660);
        });
      })(i);
    }
  }

  function navigate(dir) {
    if (isAnimating) return;
    isAnimating = true;
    var prev = activeIndex;
    activeIndex = dir === 'next' ? (activeIndex + 1) % 4 : (activeIndex + 3) % 4;
    render(prev);
    setTimeout(function() { isAnimating = false; }, 650);
  }

  function goTo(idx) {
    if (isAnimating || idx === activeIndex) return;
    isAnimating = true;
    var prev = activeIndex;
    activeIndex = idx;
    render(prev);
    setTimeout(function() { isAnimating = false; }, 650);
  }

  document.getElementById('btn-prev').addEventListener('click', function() { navigate('prev'); });
  document.getElementById('btn-next').addEventListener('click', function() { navigate('next'); });
  document.getElementById('discover').addEventListener('click', function(e) { e.preventDefault(); });

  document.querySelectorAll('.dot').forEach(function(d) {
    d.addEventListener('click', function() { goTo(+d.dataset.i); });
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft')  navigate('prev');
    if (e.key === 'ArrowRight') navigate('next');
  });

  /* Touch swipe */
  var txStart = 0, tyStart = 0;
  var app = document.getElementById('app');

  app.addEventListener('touchstart', function(e) {
    txStart = e.touches[0].clientX;
    tyStart = e.touches[0].clientY;
  }, { passive: true });

  app.addEventListener('touchend', function(e) {
    var dx  = e.changedTouches[0].clientX - txStart;
    var dy  = Math.abs(e.changedTouches[0].clientY - tyStart);
    var adx = Math.abs(dx);
    if (adx > 45 && adx > dy * 1.3) navigate(dx < 0 ? 'next' : 'prev');
  }, { passive: true });

  window.addEventListener('resize', function() { render(); });

  document.querySelectorAll('.c-item').forEach(function(el) { el.style.transition = 'none'; });
  render();
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      document.querySelectorAll('.c-item').forEach(function(el) { el.style.transition = ''; });
    });
  });
</script>
</body>
</html>
