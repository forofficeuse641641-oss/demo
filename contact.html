<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TOONHUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      transition: background-color 650ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    #grain {
      position: absolute; inset: 0;
      pointer-events: none; z-index: 50;
      background-size: 200px 200px;
      background-repeat: repeat;
      opacity: 0.4;
    }

    #ghost-text {
      position: absolute; left: 0; right: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none; user-select: none;
      z-index: 2; top: 14%;
      font-family: 'Anton', sans-serif;
      font-size: clamp(52px, 22vw, 380px);
      font-weight: 900; color: white;
      line-height: 1; text-transform: uppercase;
      letter-spacing: -0.02em; white-space: nowrap;
    }

    #brand {
      position: absolute;
      top: max(1.2rem, env(safe-area-inset-top, 1.2rem));
      left: 1rem; z-index: 60;
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; color: white;
      opacity: 0.9; letter-spacing: 0.18em;
    }
    @media (min-width: 640px) { #brand { left: 2rem; font-size: 0.75rem; } }

    #carousel { position: absolute; inset: 0; z-index: 3; }

    .c-item {
      position: absolute;
      aspect-ratio: 0.6 / 1;
      transition:
        transform 650ms cubic-bezier(0.4, 0, 0.2, 1),
        filter    650ms cubic-bezier(0.4, 0, 0.2, 1),
        opacity   650ms cubic-bezier(0.4, 0, 0.2, 1),
        left      650ms cubic-bezier(0.4, 0, 0.2, 1),
        height    650ms cubic-bezier(0.4, 0, 0.2, 1),
        bottom    650ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform, filter, opacity;
    }

    .c-item img {
      width: 100%; height: 100%;
      object-fit: contain; object-position: bottom center;
      user-select: none; -webkit-user-drag: none; pointer-events: none;
    }

    /* ── Bottom bar ── */
    #bottom-bar {
      position: absolute;
      bottom: max(1.1rem, env(safe-area-inset-bottom, 1.1rem));
      left: 0; right: 0;
      z-index: 60;
      /* Mobile: centred column */
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
      padding: 0 1.25rem;
    }
    @media (min-width: 640px) {
      #bottom-bar {
        flex-direction: row;
        align-items: flex-end;
        bottom: 4.5rem;
        padding: 0 3rem 0 6rem;
        gap: 0;
      }
    }

    #text-block {
      text-align: center;
      order: 2;
    }
    @media (min-width: 640px) {
      #text-block { text-align: left; order: 1; flex: 1; }
    }

    #text-block .title {
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em;
      font-size: clamp(0.82rem, 4vw, 22px);
      color: white; opacity: 0.95;
      margin-bottom: 0.2rem;
    }

    #text-block .desc {
      display: none;
      font-size: 0.875rem; color: white;
      opacity: 0.82; line-height: 1.6;
      margin-bottom: 1rem;
    }
    @media (min-width: 640px) { #text-block .desc { display: block; } }

    /* nav row: prev • dots • next */
    #nav-row {
      display: flex; align-items: center; gap: 0.55rem;
      order: 1;
    }
    @media (min-width: 640px) { #nav-row { order: 2; } }

    .nav-btn {
      width: 2.5rem; height: 2.5rem;
      border-radius: 50%;
      background: transparent;
      border: 2px solid white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 150ms ease, background-color 150ms ease;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    @media (min-width: 640px) { .nav-btn { width: 4rem; height: 4rem; } }
    .nav-btn:hover  { transform: scale(1.08); background-color: rgba(255,255,255,0.12); }
    .nav-btn:active { transform: scale(0.94); }
    .nav-btn svg {
      width: 18px; height: 18px;
      stroke: white; stroke-width: 2.4;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
    }
    @media (min-width: 640px) { .nav-btn svg { width: 26px; height: 26px; } }

    /* ── Dot slider ── */
    #dot-slider {
      display: flex; align-items: center; gap: 5px;
    }
    @media (min-width: 640px) { #dot-slider { display: none; } }

    .dot {
      height: 6px; width: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.38);
      transition: background 300ms, width 300ms ease, border-radius 300ms;
      cursor: pointer;
      flex-shrink: 0;
    }
    .dot.active {
      width: 20px; border-radius: 3px;
      background: white;
    }

    /* ── Discover ── */
    /* Mobile: top-right corner, compact */
    #discover {
      position: absolute; z-index: 60;
      display: flex; align-items: center; gap: 5px;
      font-family: 'Anton', sans-serif;
      font-weight: 400; color: white; opacity: 0.95;
      letter-spacing: -0.02em; line-height: 1;
      text-transform: uppercase; text-decoration: none;
      transition: opacity 200ms ease;
      top: max(1.1rem, env(safe-area-inset-top, 1.1rem));
      right: 1rem;
      font-size: clamp(12px, 3.8vw, 17px);
    }
    @media (min-width: 640px) {
      #discover {
        top: auto;
        bottom: 4.5rem; right: 2.5rem;
        font-size: clamp(20px, 4vw, 56px);
        gap: 0.5rem;
      }
    }
    #discover:hover { opacity: 1; }
    #discover svg {
      stroke: white; stroke-width: 2.4;
      fill: none; stroke-linecap: round; stroke-linejoin: round;
      width: 13px; height: 13px; flex-shrink: 0;
    }
    @media (min-width: 640px) { #discover svg { width: 2rem; height: 2rem; } }
  </style>
</head>
<body>
<div id="app">

  <div id="grain"></div>
  <div id="ghost-text">3D SHAPE</div>
  <div id="brand">TOONHUB</div>

  <div id="carousel">
    <div class="c-item" id="item-0">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/1.02464a56.png" alt="Character 1" draggable="false" />
    </div>
    <div class="c-item" id="item-1">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/2.b977faab.png" alt="Character 2" draggable="false" />
    </div>
    <div class="c-item" id="item-2">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/3.4df853b4.png" alt="Character 3" draggable="false" />
    </div>
    <div class="c-item" id="item-3">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/4.4457fbce.png" alt="Character 4" draggable="false" />
    </div>
  </div>

  <div id="bottom-bar">
    <div id="text-block">
      <p class="title">TOONHUB FIGURINES</p>
      <p class="desc">The artwork is stunning, shipped fully prepared. The finish is a vision, the 3D craft is flawless. Many thanks! Wishing you the win. Order now.</p>
    </div>
    <div id="nav-row">
      <button class="nav-btn" id="btn-prev" aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <div id="dot-slider">
        <div class="dot active" data-i="0"></div>
        <div class="dot" data-i="1"></div>
        <div class="dot" data-i="2"></div>
        <div class="dot" data-i="3"></div>
      </div>
      <button class="nav-btn" id="btn-next" aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>
  </div>

  <a href="#" id="discover">
    DISCOVER IT
    <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
  </a>

</div>
<script>
  const IMAGES = [
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/1.02464a56.png', bg: '#F4845F' },
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/2.b977faab.png', bg: '#6BBF7A' },
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/3.4df853b4.png', bg: '#E882B4' },
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/4.4457fbce.png', bg: '#6EB5FF' },
  ];

  IMAGES.forEach(({ src }) => { const img = new Image(); img.src = src; });

  const grainSVG = "<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.08'/></svg>";
  document.getElementById('grain').style.backgroundImage = 'url("data:image/svg+xml,' + encodeURIComponent(grainSVG) + '")';

  let activeIndex = 0;
  let isAnimating = false;
  const isMobile = () => window.innerWidth < 640;

  function getZMap(idx) {
    const z = {};
    z[idx]           = 20;
    z[(idx + 3) % 4] = 10;
    z[(idx + 1) % 4] = 10;
    z[(idx + 2) % 4] =  5;
    return z;
  }

  function getRoleStyle(i) {
    const mob    = isMobile();
    const center = activeIndex;
    const left   = (activeIndex + 3) % 4;
    const right  = (activeIndex + 1) % 4;

    if (i === center) return {
      transform: 'translateX(-50%) scale(' + (mob ? 1.18 : 1.68) + ')',
      filter: 'none', opacity: '1',
      left: '50%',
      height: mob ? '55%' : '92%',
      bottom: mob ? '20%' : '0'
    };
    if (i === left) return {
      transform: 'translateX(-50%) scale(1)',
      filter: 'blur(2px)', opacity: '0.7',
      left: mob ? '16%' : '30%',
      height: mob ? '18%' : '28%',
      bottom: mob ? '28%' : '12%'
    };
    if (i === right) return {
      transform: 'translateX(-50%) scale(1)',
      filter: 'blur(2px)', opacity: '0.7',
      left: mob ? '84%' : '70%',
      height: mob ? '18%' : '28%',
      bottom: mob ? '28%' : '12%'
    };
    // back
    return {
      transform: 'translateX(-50%) scale(1)',
      filter: 'blur(4px)', opacity: '0.5',
      left: '50%',
      height: mob ? '13%' : '22%',
      bottom: mob ? '28%' : '12%'
    };
  }

  function updateDots() {
    document.querySelectorAll('.dot').forEach(function(d, i) {
      d.classList.toggle('active', i === activeIndex);
    });
  }

  function render(prevIndex) {
    document.getElementById('app').style.backgroundColor = IMAGES[activeIndex].bg;
    updateDots();

    const newZ  = getZMap(activeIndex);
    const prevZ = prevIndex !== undefined ? getZMap(prevIndex) : newZ;

    for (let i = 0; i < 4; i++) {
      (function(idx) {
        const el     = document.getElementById('item-' + idx);
        const styles = getRoleStyle(idx);

        el.style.transition = 'none';
        el.style.zIndex = String(Math.min(newZ[idx], prevZ[idx]));

        requestAnimationFrame(function() {
          el.style.transition = '';
          el.style.transform  = styles.transform;
          el.style.filter     = styles.filter;
          el.style.opacity    = styles.opacity;
          el.style.left       = styles.left;
          el.style.height     = styles.height;
          el.style.bottom     = styles.bottom;
          setTimeout(function() { el.style.zIndex = String(newZ[idx]); }, 660);
        });
      })(i);
    }
  }

  function navigate(dir) {
    if (isAnimating) return;
    isAnimating = true;
    const prev = activeIndex;
    activeIndex = dir === 'next' ? (activeIndex + 1) % 4 : (activeIndex + 3) % 4;
    render(prev);
    setTimeout(function() { isAnimating = false; }, 650);
  }

  function goTo(idx) {
    if (isAnimating || idx === activeIndex) return;
    isAnimating = true;
    const prev = activeIndex;
    activeIndex = idx;
    render(prev);
    setTimeout(function() { isAnimating = false; }, 650);
  }

  document.getElementById('btn-prev').addEventListener('click', function() { navigate('prev'); });
  document.getElementById('btn-next').addEventListener('click', function() { navigate('next'); });
  document.getElementById('discover').addEventListener('click', function(e) { e.preventDefault(); });

  document.querySelectorAll('.dot').forEach(function(d) {
    d.addEventListener('click', function() { goTo(+d.dataset.i); });
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft')  navigate('prev');
    if (e.key === 'ArrowRight') navigate('next');
  });

  /* ── Touch swipe ── */
  var touchStartX = 0;
  var touchStartY = 0;

  document.getElementById('app').addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.getElementById('app').addEventListener('touchend', function(e) {
    var dx  = e.changedTouches[0].clientX - touchStartX;
    var dy  = Math.abs(e.changedTouches[0].clientY - touchStartY);
    var adx = Math.abs(dx);
    // Horizontal swipe: at least 45px and more horizontal than vertical
    if (adx > 45 && adx > dy * 1.3) {
      navigate(dx < 0 ? 'next' : 'prev');
    }
  }, { passive: true });

  window.addEventListener('resize', function() { render(); });

  // Initial paint — no transition
  document.querySelectorAll('.c-item').forEach(function(el) { el.style.transition = 'none'; });
  render();
  requestAnimationFrame(function() {
    requestAnimationFrame(function() {
      document.querySelectorAll('.c-item').forEach(function(el) { el.style.transition = ''; });
    });
  });
</script>
</body>
</html>
