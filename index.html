<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TOONHUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      transition: background-color 650ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Grain overlay */
    #grain {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      background-size: 200px 200px;
      background-repeat: repeat;
      opacity: 0.4;
    }

    /* Ghost text */
    #ghost-text {
      position: absolute;
      left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      user-select: none;
      z-index: 2;
      top: 18%;
      font-family: 'Anton', sans-serif;
      font-size: clamp(90px, 28vw, 380px);
      font-weight: 900;
      color: white;
      line-height: 1;
      text-transform: uppercase;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    /* Brand label */
    #brand {
      position: absolute;
      top: 1.5rem;
      left: 1rem;
      z-index: 60;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      color: white;
      opacity: 0.9;
      letter-spacing: 0.18em;
    }
    @media (min-width: 640px) {
      #brand { left: 2rem; }
    }

    /* Carousel container */
    #carousel {
      position: absolute;
      inset: 0;
      z-index: 3;
    }

    /* Each carousel item */
    .c-item {
      position: absolute;
      aspect-ratio: 0.6 / 1;
      transition:
        transform 650ms cubic-bezier(0.4, 0, 0.2, 1),
        filter 650ms cubic-bezier(0.4, 0, 0.2, 1),
        opacity 650ms cubic-bezier(0.4, 0, 0.2, 1),
        left 650ms cubic-bezier(0.4, 0, 0.2, 1),
        height 650ms cubic-bezier(0.4, 0, 0.2, 1),
        bottom 650ms cubic-bezier(0.4, 0, 0.2, 1);
      will-change: transform, filter, opacity;
    }

    .c-item img {
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: bottom center;
      draggable: false;
      user-select: none;
      -webkit-user-drag: none;
    }

    /* Bottom-left UI */
    #bottom-left {
      position: absolute;
      bottom: 1.5rem;
      left: 1rem;
      z-index: 60;
      max-width: 320px;
    }
    @media (min-width: 640px) {
      #bottom-left { bottom: 5rem; left: 6rem; }
    }

    #bottom-left .title {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.02em;
      margin-bottom: 0.5rem;
      font-size: 1rem;
      color: white;
      opacity: 0.95;
    }
    @media (min-width: 640px) {
      #bottom-left .title { margin-bottom: 0.75rem; font-size: 22px; }
    }

    #bottom-left .desc {
      display: none;
      font-size: 0.875rem;
      color: white;
      opacity: 0.85;
      line-height: 1.6;
      margin-bottom: 1.25rem;
    }
    @media (min-width: 640px) {
      #bottom-left .desc { display: block; }
    }

    .nav-buttons {
      display: flex;
      gap: 0.75rem;
    }

    .nav-btn {
      width: 3rem; height: 3rem;
      border-radius: 50%;
      background: transparent;
      border: 2px solid white;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 150ms ease, background-color 150ms ease;
      flex-shrink: 0;
    }
    @media (min-width: 640px) {
      .nav-btn { width: 4rem; height: 4rem; }
    }
    .nav-btn:hover {
      transform: scale(1.08);
      background-color: rgba(255,255,255,0.12);
    }
    .nav-btn svg {
      width: 26px; height: 26px;
      stroke: white;
      stroke-width: 2.25;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Bottom-right discover link */
    #discover {
      position: absolute;
      bottom: 1.5rem;
      right: 1rem;
      z-index: 60;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Anton', sans-serif;
      font-size: clamp(20px, 4vw, 56px);
      font-weight: 400;
      color: white;
      opacity: 0.95;
      letter-spacing: -0.02em;
      line-height: 1;
      text-transform: uppercase;
      text-decoration: none;
      transition: opacity 200ms ease;
    }
    @media (min-width: 640px) {
      #discover { bottom: 5rem; right: 2.5rem; }
    }
    #discover:hover { opacity: 1; }
    #discover svg {
      stroke: white;
      stroke-width: 2.25;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #discover .arrow-icon {
      width: 1.25rem; height: 1.25rem;
    }
    @media (min-width: 640px) {
      #discover .arrow-icon { width: 2rem; height: 2rem; }
    }
  </style>
</head>
<body>

<div id="app">

  <!-- Grain overlay -->
  <div id="grain"></div>

  <!-- Ghost text -->
  <div id="ghost-text">3D SHAPE</div>

  <!-- Brand label -->
  <div id="brand">TOONHUB</div>

  <!-- Carousel -->
  <div id="carousel">
    <div class="c-item" id="item-0">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/1.02464a56.png" alt="Character 1" draggable="false" />
    </div>
    <div class="c-item" id="item-1">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/2.b977faab.png" alt="Character 2" draggable="false" />
    </div>
    <div class="c-item" id="item-2">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/3.4df853b4.png" alt="Character 3" draggable="false" />
    </div>
    <div class="c-item" id="item-3">
      <img src="https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/4.4457fbce.png" alt="Character 4" draggable="false" />
    </div>
  </div>

  <!-- Bottom-left text + nav -->
  <div id="bottom-left">
    <p class="title">TOONHUB FIGURINES</p>
    <p class="desc">The artwork is stunning, shipped fully prepared. The finish is a vision, the 3D craft is flawless. Many thanks! Wishing you the win. Order now.</p>
    <div class="nav-buttons">
      <button class="nav-btn" id="btn-prev" aria-label="Previous">
        <svg viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
      </button>
      <button class="nav-btn" id="btn-next" aria-label="Next">
        <svg viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
      </button>
    </div>
  </div>

  <!-- Bottom-right discover -->
  <a href="#" id="discover">
    DISCOVER IT
    <svg class="arrow-icon" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
  </a>

</div>

<script>
  const IMAGES = [
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/1.02464a56.png', bg: '#F4845F' },
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/2.b977faab.png', bg: '#6BBF7A' },
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/3.4df853b4.png', bg: '#E882B4' },
    { src: 'https://fifth-gentle-45902158.figma.site/_components/v2/4de492f6d9cf8244ad5293233e5c6f52407d42fc/4.4457fbce.png', bg: '#6EB5FF' },
  ];

  IMAGES.forEach(({ src }) => { const img = new Image(); img.src = src; });

  const grainSVG = `<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)' opacity='0.08'/></svg>`;
  document.getElementById('grain').style.backgroundImage = `url("data:image/svg+xml,${encodeURIComponent(grainSVG)}")`;

  let activeIndex = 0;
  let isAnimating = false;

  const isMobile = () => window.innerWidth < 640;

  // Returns z-index assignments for a given center index
  function getZMap(idx) {
    const z = {};
    z[idx]           = 20; // center
    z[(idx + 3) % 4] = 10; // left
    z[(idx + 1) % 4] = 10; // right
    z[(idx + 2) % 4] =  5; // back
    return z;
  }

  function getRoleStyle(i) {
    const center = activeIndex;
    const left   = (activeIndex + 3) % 4;
    const right  = (activeIndex + 1) % 4;
    const mob    = isMobile();

    if (i === center) return {
      transform: `translateX(-50%) scale(${mob ? 1.25 : 1.68})`,
      filter: 'none', opacity: '1',
      left: '50%', height: mob ? '60%' : '92%', bottom: mob ? '22%' : '0'
    };
    if (i === left) return {
      transform: 'translateX(-50%) scale(1)',
      filter: 'blur(2px)', opacity: '0.85',
      left: mob ? '20%' : '30%', height: mob ? '16%' : '28%', bottom: mob ? '32%' : '12%'
    };
    if (i === right) return {
      transform: 'translateX(-50%) scale(1)',
      filter: 'blur(2px)', opacity: '0.85',
      left: mob ? '80%' : '70%', height: mob ? '16%' : '28%', bottom: mob ? '32%' : '12%'
    };
    return {
      transform: 'translateX(-50%) scale(1)',
      filter: 'blur(4px)', opacity: '1',
      left: '50%', height: mob ? '13%' : '22%', bottom: mob ? '32%' : '12%'
    };
  }

  function render(prevIndex) {
    document.getElementById('app').style.backgroundColor = IMAGES[activeIndex].bg;

    const newZ  = getZMap(activeIndex);
    const prevZ = prevIndex !== undefined ? getZMap(prevIndex) : newZ;

    for (let i = 0; i < 4; i++) {
      const el = document.getElementById('item-' + i);
      const styles = getRoleStyle(i);

      // Step 1: instantly set z-index to the LOWER of old and new.
      // This means the outgoing center (z=20) immediately drops to its
      // destination z before anything moves, so it can never float above
      // the incoming center during the animation.
      el.style.transition = 'none';
      el.style.zIndex = String(Math.min(newZ[i], prevZ[i]));

      // Step 2: next frame — re-enable transitions and animate position/scale/blur
      requestAnimationFrame(() => {
        el.style.transition = '';
        el.style.transform = styles.transform;
        el.style.filter    = styles.filter;
        el.style.opacity   = styles.opacity;
        el.style.left      = styles.left;
        el.style.height    = styles.height;
        el.style.bottom    = styles.bottom;

        // Step 3: once animation is done, snap to the true final z-index
        setTimeout(() => { el.style.zIndex = String(newZ[i]); }, 660);
      });
    }
  }

  function navigate(dir) {
    if (isAnimating) return;
    isAnimating = true;
    const prev = activeIndex;
    activeIndex = dir === 'next' ? (activeIndex + 1) % 4 : (activeIndex + 3) % 4;
    render(prev);
    setTimeout(() => { isAnimating = false; }, 650);
  }

  document.getElementById('btn-prev').addEventListener('click', () => navigate('prev'));
  document.getElementById('btn-next').addEventListener('click', () => navigate('next'));
  document.getElementById('discover').addEventListener('click', e => e.preventDefault());

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') navigate('prev');
    if (e.key === 'ArrowRight') navigate('next');
  });

  window.addEventListener('resize', () => render());

  // Initial render without transition
  document.querySelectorAll('.c-item').forEach(el => el.style.transition = 'none');
  render();
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      document.querySelectorAll('.c-item').forEach(el => el.style.transition = '');
    });
  });
</script>

</body>
</html>
